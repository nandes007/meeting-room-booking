services:
  db:
    image: postgres:16-alpine
    container_name: meeting-room-booking-db
    environment:
      - POSTGRES_DB=meeting_room_booking_db
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d meeting_room_booking_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./meeting-room-booking-api
      dockerfile: Dockerfile
    container_name: meeting-room-booking-api
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/meeting_room_booking_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_LIQUIBASE_ENABLED=true
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./meeting-room-booking-fe
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    container_name: meeting-room-booking-fe
    ports:
      - "9100:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
