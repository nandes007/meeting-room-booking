services:
  db:
    image: postgres:16-alpine
    container_name: meeting-room-booking-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=meeting_room_booking_db
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d meeting_room_booking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./meeting-room-booking-api
      dockerfile: Dockerfile
    container_name: meeting-room-booking-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/meeting_room_booking_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_LIQUIBASE_ENABLED=true
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./meeting-room-booking-fe
      dockerfile: Dockerfile
    container_name: meeting-room-booking-fe
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
